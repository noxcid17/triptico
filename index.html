</head>

        const Globe = ({className}) => <svg className={className} {...IconProps}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>;

        // DICCIONARIO DE IDIOMAS
        // ==========================================

            respectToday: "Respeita hoje,<br/>desfruta sempre!",

            wordSearch: "Sopa de Letras",

            hangman: "O Jogo da Forca",

            print: "Imprimir",
            worldAtScale: "¡El Mundo<br/>a tu Medida!",

            guardians: "Guardianes<br/>del<br/>Patrimonio",
            littleHeroes: "¡Pequeños Héroes! 🦸‍♂️",

        const CustomLogo = ({ className }) => (
          <img 
            src="https://www.fbb.pt/pp/wp-content/uploads/sites/11/2019/11/FBB-LOGO-Pp-2.svg" 
            alt="Logo Portugal dos Pequenitos" 
            className={`${className} object-contain drop-shadow-md`}
          />
        );

          <svg className={`${className} fill-white opacity-90`} viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.8-4.2-4.1-4.5-.4-3-3-5.3-6.1-5.3-2.7 0-5.1 1.8-5.9 4.3C3.6 9.3 2 11.2 2 13.5 2 16 4 18 6.5 19h11z"/>
          </svg>
        );

        // FONDOS VECTORIALES (100% compatibles con impresión)
        // ==========================================

          <div className="absolute inset-0 z-0 pointer-events-none overflow-hidden opacity-10">
            <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
                  <circle cx="2" cy="2" r="1.5" fill="#d97706" />
                </pattern>
              </defs>
              <rect width="100%" height="100%" fill="url(#dots)" />
            </svg>
          </div>
        );

        const NotebookBg = () => (
          <div className="absolute inset-0 z-0 pointer-events-none overflow-hidden bg-white rounded-lg">
            <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <pattern id="notebookLines" x="0" y="0" width="100" height="24" patternUnits="userSpaceOnUse">
                  <line x1="0" y1="23" x2="100" y2="23" stroke="#e5e7eb" strokeWidth="1.5" />
                </pattern>
              </defs>
              <rect width="100%" height="100%" fill="url(#notebookLines)" />
              <line x1="40" y1="0" x2="40" y2="100%" stroke="#93c5fd" strokeWidth="2" opacity="0.8" />
            </svg>
          </div>
        );

        const SunburstBg = () => (
          <div className="absolute inset-0 z-0 pointer-events-none overflow-hidden bg-yellow-400 rounded-lg">
            <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
              <g transform="translate(50 50)">
                {Array.from({ length: 12 }).map((_, i) => (
                  <polygon key={i} points="0,0 -50,-150 50,-150" fill="#f59e0b" transform={`rotate(${i * 30})`} />
                ))}
              </g>
            </svg>
          </div>
        );

        // ==========================================
        // FACE EXTERIOR
        // ==========================================

          <React.Fragment>
            {/* PAINEL 5: Aba Interior */}
            <div className="panel w-full md:w-1/3 bg-[#fff9cd] p-8 relative overflow-hidden flex flex-col border-b md:border-b-0 md:border-r border-yellow-200">
              <DotsBg />
              <div className="text-center z-10 mt-8">
                <div className="bg-orange-400 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-white shadow-lg animate-float">
                  <MapIcon className="w-10 h-10 text-white" />
                </div>
                <h2 className="text-3xl font-title font-black text-orange-600 mb-4 tracking-wide" dangerouslySetInnerHTML={{__html: t.worldAtScale}}></h2>
                <p className="text-lg text-orange-900 font-bold bg-white/60 p-4 rounded-2xl border-2 border-orange-200 shadow-sm">{t.adventureText}</p>

              <Cloud className="w-24 h-12 absolute top-10 left-4 animate-float-slow" />

              <div className="p-8 mt-16 text-center z-10">

                <p className="text-blue-900 font-bold mb-6 bg-blue-200/50 p-3 rounded-xl">{t.scanCode}</p>
                <div className="bg-white p-4 rounded-[2rem] shadow-xl border-4 border-blue-400 inline-block transform -rotate-3 hover:rotate-0 transition-transform relative">
                  <div className="absolute -top-4 -right-4 bg-yellow-400 text-yellow-900 w-10 h-10 flex items-center justify-center rounded-full font-bold shadow-md transform rotate-12">📱</div>
                  <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.fbb.pt/&color=1e3a8a&bgcolor=ffffff" alt="QR Code" className="w-32 h-32 rounded-xl" />
                </div>
              </div>
              <div className="bg-blue-500 text-white p-8 rounded-t-[50px] text-center mt-auto shadow-[0_-10px_20px_rgba(0,0,0,0.1)] relative z-10 organic-shape-top">
                <div className="flex flex-col gap-4 items-center">
                  <a href="#" className="flex items-center gap-2 font-bold text-lg hover:text-yellow-300 transition-colors bg-blue-600 px-4 py-2 rounded-full w-full justify-center shadow-inner">
                    <Instagram className="w-6 h-6" /> @portugaldospequenitos
                  </a>
                  <a href="https://www.fbb.pt/" className="flex items-center gap-2 font-bold text-lg hover:text-yellow-300 transition-colors bg-blue-600 px-4 py-2 rounded-full w-full justify-center shadow-inner">
                    <Globe className="w-6 h-6" /> www.fbb.pt
                  </a>
                </div>
              </div>
            </div>

            {/* PAINEL 1: PORTADA */}
            <div className="panel w-full md:w-1/3 relative overflow-hidden flex flex-col justify-between bg-gradient-to-b from-sky-300 via-sky-200 to-green-300">
              <div className="absolute top-4 right-4 w-20 h-20 bg-yellow-300 rounded-full shadow-[0_0_40px_rgba(253,224,71,0.8)] animate-pulse"></div>
              <Cloud className="w-32 h-16 absolute top-12 -left-8 animate-float" />
              <Cloud className="w-20 h-10 absolute top-24 right-12 animate-float-slow" />
              
              <div className="p-8 relative z-20 text-center pt-20">

                  <CustomLogo className="w-40 h-16 mx-auto" />

                <h1 className="text-4xl lg:text-5xl font-title font-black text-white drop-shadow-[0_4px_4px_rgba(0,0,0,0.3)] mb-4 uppercase leading-tight" style={{ WebkitTextStroke: '1px #1e3a8a' }} dangerouslySetInnerHTML={{__html: t.guardians}}></h1>
              </div>

              <div className="bg-orange-500 text-white p-8 rounded-t-[60px] relative z-10 text-center shadow-[0_-15px_30px_rgba(0,0,0,0.2)]">
                <div className="absolute -top-8 left-1/2 -translate-x-1/2 bg-yellow-400 p-4 rounded-full shadow-xl border-4 border-white transform -rotate-12 animate-bounce">

                </div>
                <div className="bg-white text-orange-600 rounded-full py-2 px-6 inline-block mt-8 mb-4 border-4 border-orange-300 shadow-md">

                </div>
                <p className="font-black text-xl text-yellow-200 uppercase tracking-widest mb-6 flex items-center justify-center gap-3">
                  <Footprints className="w-6 h-6 fill-current" /> {t.footprints} <Footprints className="w-6 h-6 fill-current" />
                </p>
                <div className="text-4xl flex justify-center gap-4 mt-4 drop-shadow-md">
                  <span className="animate-float" style={{animationDelay: '0s'}}>👦</span>
                  <span className="animate-float" style={{animationDelay: '0.5s'}}>🏰</span>
                  <span className="animate-float" style={{animationDelay: '1s'}}>👧</span>
                </div>
              </div>
            </div>
          </React.Fragment>
        );

        // ==========================================
        // FACE INTERIOR
        // ==========================================
        const FaceInterior = ({ t }) => (
          <React.Fragment>
            {/* PAINEL 2: Regras */}
            <div className="panel w-full md:w-1/3 bg-orange-50 relative overflow-hidden flex flex-col">

                  <p className="text-orange-900 font-bold font-title text-lg leading-tight">{t.rule1}</p>

                </div>
              </div>

                  {t.wordSearchWords}

                <div className="grid grid-cols-10 gap-1 bg-blue-50 p-2 rounded-2xl border-2 border-blue-200">
                  {t.grid.map((letter, i) => {
                      const colors = ['text-orange-600', 'text-blue-600', 'text-green-600', 'text-pink-600', 'text-purple-600'];
                      const randomColor = colors[i % colors.length];
                      return (
                        <div key={i} className={`aspect-square flex items-center justify-center text-[10px] sm:text-xs font-black ${randomColor} bg-white rounded shadow-sm border border-gray-100 cursor-pointer hover:bg-yellow-200 hover:scale-110 transition-all`}>
                          {letter}
                        </div>
                      );
                  })}
                </div>
              </div>

              <div className="relative z-10 bg-white/90 backdrop-blur-sm p-3 sm:p-5 rounded-3xl shadow-md border-4 border-green-300 mt-auto transform -rotate-1">
                <div className="absolute -top-4 -right-4 bg-green-400 text-green-900 w-10 h-10 flex items-center justify-center rounded-full font-black text-xl shadow-md transform rotate-12">2</div>
                <h3 className="font-bold font-title text-lg sm:text-xl text-green-700 mb-2 text-center">{t.hangman}</h3>
                <p className="text-xs sm:text-sm text-center text-green-900 mb-3 bg-green-50 p-2 rounded-xl font-bold border border-green-200">
                  {t.hangmanQuestion}
                </p>
                <div className="flex items-center justify-center gap-4 mb-3">
                  <div className="text-3xl sm:text-4xl animate-bounce">👾</div>
                  <svg viewBox="0 0 100 120" className="w-12 h-16 sm:w-16 sm:h-20 stroke-orange-500 fill-none stroke-[6px] stroke-linecap-round">
                    <path d="M10,110 L90,110 M30,110 L30,10 L70,10 L70,30" />
                    <circle cx="70" cy="45" r="12" />
                    <path d="M70,57 L70,80 M70,60 L50,75 M70,60 L90,75 M70,80 L55,105 M70,80 L85,105" className="opacity-20 stroke-dashed" />
                  </svg>
                </div>
                {/* Ajustado para asegurar que caben en una sola fila sin saltar de línea */}
                <div className="flex justify-center gap-1 sm:gap-2 flex-wrap print:flex-nowrap mb-2 sm:mb-4">
                  {Array(t.hangmanSpaces).fill('').map((_, i) => (
                    <div key={i} className="w-4 h-5 sm:w-5 sm:h-8 border-b-4 border-blue-500"></div>
                  ))}
                </div>
                <div className="flex flex-col items-center justify-center pb-1">
                  <p className="text-[10px] text-gray-400 font-bold uppercase leading-none">{t.solution}</p>
                  <p className="text-[10px] sm:text-xs font-black text-gray-300 transform rotate-180 select-none inline-block mt-1 leading-none">{t.hangmanAnswer}</p>
                </div>
              </div>
            </div>

            {/* PAINEL 4: Missão */}
            <div className="panel w-full md:w-1/3 relative flex flex-col p-8 items-center text-center justify-center overflow-hidden border-l-4 border-orange-400">
              <SunburstBg />
              <div className="absolute top-10 left-10 w-4 h-4 bg-blue-500 rounded-full animate-ping"></div>
              <div className="absolute top-20 right-10 w-3 h-3 bg-pink-500 rounded-full animate-pulse"></div>
              <div className="absolute bottom-32 left-8 w-5 h-5 bg-green-500 rounded-full animate-bounce"></div>
              
              <div className="relative z-10 flex flex-col items-center w-full">
                <div className="bg-white p-4 rounded-full shadow-2xl mb-4 border-8 border-orange-500 animate-pulse">
                  <Award className="w-20 h-20 text-yellow-500" />
                </div>
                <h2 className="text-4xl font-title font-black mb-4 text-white drop-shadow-[0_4px_4px_rgba(217,119,6,0.8)] leading-tight" style={{ WebkitTextStroke: '2px #d97706' }} dangerouslySetInnerHTML={{__html: t.missionComplete}}></h2>
                <div className="bg-white/95 p-6 rounded-3xl border-4 border-yellow-400 mb-8 w-full shadow-xl transform rotate-2">
                  <p className="text-lg font-bold text-orange-800 mb-2">{t.ifFinished}</p>
                  <p className="text-2xl font-title font-black text-orange-600">{t.youAreGuardian}</p>
                </div>
                <div className="bg-white w-full aspect-square max-w-[200px] rounded-[30px] border-[6px] border-dashed border-blue-400 flex flex-col items-center justify-center p-4 transform -rotate-3 hover:rotate-0 transition-transform shadow-lg relative group cursor-pointer">
                  <div className="absolute inset-0 bg-blue-50 opacity-0 group-hover:opacity-100 transition-opacity rounded-[24px]"></div>
                  <Star className="w-12 h-12 text-blue-200 mb-2 relative z-10" />
                  <p className="font-title font-black text-lg text-blue-400 uppercase tracking-wide text-center leading-tight relative z-10" dangerouslySetInnerHTML={{__html: t.placeStamp}}></p>
                </div>
              </div>
            </div>
          </React.Fragment>
        );

        // ==========================================
        // COMPONENTE PRINCIPAL (TRÍPTICO)
        // ==========================================
        const Triptico = () => {
          const [view, setView] = useState('exterior'); // 'exterior' | 'interior'
          const [lang, setLang] = useState('pt'); // 'pt' | 'en' | 'es'

          const t = translations[lang];

          const handlePrint = () => {
            window.print();
          };

          return (
            <div className="min-h-screen p-4 md:p-8 font-sans print:p-0 print:m-0 print:bg-white" style={{ fontFamily: "'Nunito', sans-serif" }}>
              <style dangerouslySetInnerHTML={{__html: `
                @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;800;900&display=swap');
                .font-title { font-family: 'Fredoka', sans-serif; }
                .organic-shape-top { clip-path: polygon(0 10%, 100% 0, 100% 100%, 0 100%); }
                
                @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-10px) rotate(2deg); } }
                @keyframes float-slow { 0%, 100% { transform: translateX(0) translateY(0); } 50% { transform: translateX(10px) translateY(-5px); } }
                .animate-float { animation: float 3s ease-in-out infinite; }
                .animate-float-slow { animation: float-slow 6s ease-in-out infinite; }
                
                /* ESTILOS ESPECÍFICOS PARA IMPRESIÓN (A4 HORIZONTAL PERFECTO) */
                @media print {
                  @page { 
                    size: A4 landscape; 
                    margin: 0.3cm; 
                  }
                  /* Forzar al navegador a imprimir fondos y colores a toda costa */
                  body, html, * { 
                    -webkit-print-color-adjust: exact !important; 
                    print-color-adjust: exact !important; 
                    color-adjust: exact !important;
                  }
                  body { background-color: white !important; margin: 0 !important; padding: 0 !important; }
                  .print-break { page-break-before: always; }
                  
                  /* Forzar el contenedor a ser un folio completo en horizontal */
                  .face-container {
                    display: flex !important;
                    flex-direction: row !important;
                    width: 100% !important; 
                    height: 100% !important;
                    min-height: 19.5cm !important;
                    page-break-after: always;
                    page-break-inside: avoid;
                    overflow: hidden;
                  }
                  
                  /* Forzar las 3 columnas simétricas en el papel */
                  .panel {
                    width: 33.333333% !important;
                    height: 100% !important;
                    display: flex !important;
                    flex-direction: column !important;
                    box-sizing: border-box !important;
                  }
                }
              `}} />

              {/* Barra de Control (Vistas e Idiomas) - OCULTA AL IMPRIMIR */}
              <div className="max-w-6xl mx-auto mb-6 flex flex-col md:flex-row justify-between items-center bg-white p-4 rounded-3xl shadow-md border-4 border-orange-200 gap-4 print:hidden">
                <h1 className="text-xl md:text-2xl font-title font-bold text-orange-600 flex items-center gap-3">
                  <span className="text-3xl">🎨</span> {t.previewTitle}
                </h1>
                
                <div className="flex flex-col md:flex-row gap-4 items-center">
                  <div className="flex bg-gray-100 p-1.5 rounded-2xl gap-2">
                    <button onClick={() => setLang('pt')} className={`px-4 py-1.5 rounded-xl font-bold transition-all ${lang === 'pt' ? 'bg-orange-500 text-white shadow-lg' : 'text-gray-500 hover:bg-gray-200'}`}>PT</button>
                    <button onClick={() => setLang('en')} className={`px-4 py-1.5 rounded-xl font-bold transition-all ${lang === 'en' ? 'bg-blue-500 text-white shadow-lg' : 'text-gray-500 hover:bg-gray-200'}`}>EN</button>
                    <button onClick={() => setLang('es')} className={`px-4 py-1.5 rounded-xl font-bold transition-all ${lang === 'es' ? 'bg-green-500 text-white shadow-lg' : 'text-gray-500 hover:bg-gray-200'}`}>ES</button>
                  </div>

                  <div className="flex bg-blue-100 p-1.5 rounded-2xl gap-2">
                    <button onClick={() => setView('exterior')} className={`px-4 py-1.5 rounded-xl font-bold transition-all ${view === 'exterior' ? 'bg-orange-500 text-white shadow-lg' : 'text-blue-700 hover:bg-blue-200'}`}>{t.outerFace}</button>
                    <button onClick={() => setView('interior')} className={`px-4 py-1.5 rounded-xl font-bold transition-all ${view === 'interior' ? 'bg-blue-500 text-white shadow-lg' : 'text-blue-700 hover:bg-blue-200'}`}>{t.innerFace}</button>
                  </div>

                  <button onClick={handlePrint} className="flex items-center gap-2 bg-purple-500 hover:bg-purple-600 text-white px-5 py-2 rounded-xl font-bold transition-all shadow-md transform hover:scale-105">
                    <Printer className="w-5 h-5" />
                    <span>{t.print}</span>
                  </button>
                </div>
              </div>

              {/* Contentor do Tríptico */}
              <div className="max-w-7xl mx-auto shadow-2xl rounded-2xl overflow-hidden border-8 border-white relative bg-white print:border-none print:shadow-none print:m-0 print:p-0 print:max-w-none print:w-full">
                
                {/* CONTENEDOR CARA EXTERIOR */}
                <div className={`face-container w-full flex-col md:flex-row h-full min-h-[850px] print:min-h-0 ${view === 'exterior' ? 'flex' : 'hidden print:flex'}`}>
                  <FaceExterior t={t} />
                </div>

                {/* CONTENEDOR CARA INTERIOR */}
                <div className={`face-container print-break w-full flex-col md:flex-row h-full min-h-[850px] print:min-h-0 ${view === 'interior' ? 'flex' : 'hidden print:flex'}`}>
                  <FaceInterior t={t} />
                </div>

              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Triptico />);
    </script>
</body>
</html>
